name: ScreenWatcher
options:
  bundleIdPrefix: com.screenwatcher
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true

targets:
  ScreenWatcher:
    type: application
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - path: ScreenWatcher
        excludes:
          - "Resources/Info.plist"
    resources:
      - ScreenWatcher/Resources/Assets.xcassets
    info:
      path: ScreenWatcher/Resources/Info.plist
      properties:
        LSUIElement: true
        NSScreenCaptureUsageDescription: "ScreenWatcher는 화면을 캡쳐해 Telegram으로 전송하기 위해 화면 녹화 권한이 필요합니다."
        CFBundleDisplayName: ScreenWatcher
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        NSHumanReadableCopyright: "Copyright © 2026 ScreenWatcher. All rights reserved."
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.screenwatcher.app
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        ARCHS: arm64
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: "YES"
        CODE_SIGNING_ALLOWED: "YES"
        ENABLE_HARDENED_RUNTIME: "NO"
        DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
      configs:
        Debug:
          ONLY_ACTIVE_ARCH: "YES"
          SWIFT_OPTIMIZATION_LEVEL: "-Onone"
        Release:
          ONLY_ACTIVE_ARCH: "NO"
          SWIFT_OPTIMIZATION_LEVEL: "-O"
          STRIP_INSTALLED_PRODUCT: "YES"
